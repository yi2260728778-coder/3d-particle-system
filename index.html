<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 粒子系统 - 手势交互</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel-bg: rgba(16, 16, 28, 0.85);
    --text: #e0e0e0;
    --text-secondary: #a0a0b8;
    --accent: #6c5ce7;
    --accent2: #00d4ff;
    --danger: #e74c3c;
    --radius: 14px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #container {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  #container canvas {
    display: block;
  }

  /* Webcam Preview */
  #cam-preview {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.2);
    z-index: 10;
    opacity: 0.75;
    transition: var(--transition);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    background: #000;
  }
  #cam-preview:hover { opacity: 1; border-color: var(--accent2); }
  #cam-preview video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  /* Gesture Status */
  #gesture-status {
    position: fixed;
    bottom: 180px;
    right: 34px;
    z-index: 10;
    font-size: 13px;
    color: var(--text-secondary);
    text-align: right;
    pointer-events: none;
    transition: var(--transition);
    text-shadow: 0 0 12px rgba(0,0,0,0.8);
  }
  #gesture-status .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
  #gesture-status .value { font-size: 18px; font-weight: 600; color: var(--accent2); }

  /* Main Panel */
  #panel {
    position: fixed;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: var(--radius);
    padding: 24px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 210px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }

  #panel h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #panel h2 .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 10px var(--accent2);
  }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* Shape Buttons */
  .shape-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: var(--transition);
    font-family: inherit;
    width: 100%;
    text-align: left;
  }
  .shape-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border-color: rgba(255,255,255,0.15);
  }
  .shape-btn.active {
    background: rgba(108, 92, 231, 0.2);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(108, 92, 231, 0.15);
  }
  .shape-btn .icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }

  /* Color Picker */
  #color-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #color-picker {
    -webkit-appearance: none;
    appearance: none;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    background: transparent;
    padding: 0;
  }
  #color-picker::-webkit-color-swatch-wrapper { padding: 0; }
  #color-picker::-webkit-color-swatch { border-radius: 8px; border: none; }
  #color-hex {
    font-size: 13px;
    color: var(--text);
    font-family: 'SF Mono', 'Consolas', monospace;
    letter-spacing: 1px;
  }

  /* Action Buttons */
  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: var(--transition);
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .action-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }
  .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .action-btn.primary:hover {
    background: #7c6cf0;
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
  }

  #file-input { display: none; }

  /* Camera Status */
  #cam-status {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    padding: 6px 0;
    line-height: 1.5;
  }
  #cam-status.error { color: var(--danger); }

  /* Responsive */
  @media (max-width: 768px) {
    #panel {
      left: 10px;
      padding: 18px 14px;
      gap: 10px;
      min-width: 180px;
      border-radius: 12px;
    }
    #panel h2 { font-size: 13px; }
    .shape-btn { padding: 8px 10px; font-size: 12px; }
    .shape-btn .icon { font-size: 16px; width: 20px; }
    #cam-preview { width: 100px; height: 100px; bottom: 16px; right: 16px; }
    #gesture-status { bottom: 128px; right: 20px; font-size: 11px; }
  }
</style>
</head>
<body>

<div id="container"></div>

<div id="cam-preview">
  <video id="webcam" autoplay playsinline muted></video>
</div>

<div id="gesture-status">
  <div class="label">手势状态</div>
  <div class="value" id="gesture-text">初始化中...</div>
</div>

<div id="panel">
  <h2><span class="dot"></span>粒子控制</h2>

  <span class="section-label">模型选择</span>
  <button class="shape-btn active" data-shape="heart">
    <span class="icon">❤️</span> 爱心
  </button>
  <button class="shape-btn" data-shape="flower">
    <span class="icon">🌸</span> 花朵
  </button>
  <button class="shape-btn" data-shape="saturn">
    <span class="icon">🪐</span> 土星
  </button>
  <button class="shape-btn" data-shape="buddha">
    <span class="icon">🧘</span> 佛像
  </button>
  <button class="shape-btn" data-shape="fireworks">
    <span class="icon">🎆</span> 烟花
  </button>

  <span class="section-label">粒子颜色</span>
  <div id="color-row">
    <input type="color" id="color-picker" value="#6c5ce7">
    <span id="color-hex">#6C5CE7</span>
  </div>

  <button class="action-btn" id="btn-image">
    📷 替换粒子图片
  </button>
  <input type="file" id="file-input" accept="image/*">

  <button class="action-btn" id="btn-reset-image" style="display:none;">
    ↩️ 恢复默认粒子
  </button>

  <button class="action-btn primary" id="btn-fullscreen">
    ⛶ 全屏模式
  </button>

  <div id="cam-status">📡 正在初始化摄像头...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js">
</script>

<script>
// ─────────────────────────────────────
// DOM Elements
// ─────────────────────────────────────
const container = document.getElementById('container');
const videoEl = document.getElementById('webcam');
const gestureText = document.getElementById('gesture-text');
const colorPicker = document.getElementById('color-picker');
const colorHex = document.getElementById('color-hex');
const fileInput = document.getElementById('file-input');
const btnImage = document.getElementById('btn-image');
const btnResetImage = document.getElementById('btn-reset-image');
const btnFullscreen = document.getElementById('btn-fullscreen');
const camStatus = document.getElementById('cam-status');
const shapeBtns = document.querySelectorAll('.shape-btn');

// ─────────────────────────────────────
// Three.js Setup
// ─────────────────────────────────────
const PARTICLE_COUNT = 3000;
const scene = new THREE.Scene();

// Background stars
const starsGeo = new THREE.BufferGeometry();
const starsCount = 600;
const starsPos = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount; i++) {
  starsPos[i * 3] = (Math.random() - 0.5) * 20;
  starsPos[i * 3 + 1] = (Math.random() - 0.5) * 14;
  starsPos[i * 3 + 2] = (Math.random() - 0.5) * 10 - 4;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
const starsMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.015,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

// Camera
const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 50);
camera.position.z = 7;
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f);
container.appendChild(renderer.domElement);

// ─────────────────────────────────────
// Sprite Texture
// ─────────────────────────────────────
function createCircleTexture(color = '#ffffff') {
  const size = 128;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const half = size / 2;
  const gradient = ctx.createRadialGradient(half, half, 0, half, half, half);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.08, 'rgba(255,255,255,0.95)');
  gradient.addColorStop(0.25, 'rgba(255,255,255,0.7)');
  gradient.addColorStop(0.5, 'rgba(255,255,255,0.25)');
  gradient.addColorStop(0.75, 'rgba(255,255,255,0.04)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
}

let defaultSprite = createCircleTexture();
let customSprite = null;

// Particle Material
const particleMat = new THREE.PointsMaterial({
  size: 0.14,
  map: defaultSprite,
  color: new THREE.Color('#6c5ce7'),
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  depthTest: true,
  transparent: true,
  opacity: 0.9,
});

// Particle Geometry
const geo = new THREE.BufferGeometry();
const basePositions = new Float32Array(PARTICLE_COUNT * 3);
const currentPositions = new Float32Array(PARTICLE_COUNT * 3);
const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
geo.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));

const points = new THREE.Points(geo, particleMat);
scene.add(points);

// ─────────────────────────────────────
// Shape Generators
// ─────────────────────────────────────
function generateHeart(n) {
  const arr = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = (i / n) * Math.PI * 2;
    const scale = 0.13;
    const sx = 16 * Math.pow(Math.sin(t), 3);
    const sy = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    const shellR = 0.25 + Math.random() * 0.45;
    const shellAngle = Math.random() * Math.PI * 2;
    arr[i * 3] = sx * scale + Math.cos(shellAngle) * shellR * 0.25;
    arr[i * 3 + 1] = sy * scale + Math.sin(shellAngle) * shellR * 0.25;
    arr[i * 3 + 2] = (Math.random() - 0.5) * 0.7 * (1 + Math.abs(sy * scale) * 0.6);
  }
  return arr;
}

function generateFlower(n) {
  const arr = new Float32Array(n * 3);
  const petals = 6;
  const layers = 3;
  for (let i = 0; i < n; i++) {
    const layer = Math.floor(Math.random() * layers);
    const theta = Math.random() * Math.PI * 2;
    const k = petals;
    let r = Math.abs(Math.cos(k * theta / 2));
    r = r * 2.2 + 0.15;
    const px = r * Math.cos(theta);
    const py = r * Math.sin(theta);
    const zBase = (layer / (layers - 1) - 0.5) * 0.8;
    const z = zBase + (Math.random() - 0.5) * 0.25;
    arr[i * 3] = px;
    arr[i * 3 + 1] = py;
    arr[i * 3 + 2] = z;
  }
  // Center cluster
  const centerCount = Math.floor(n * 0.12);
  for (let i = n - centerCount; i < n; i++) {
    const phi = Math.acos(2 * Math.random() - 1);
    const th = Math.random() * Math.PI * 2;
    const rad = Math.random() * 0.35;
    arr[i * 3] = rad * Math.sin(phi) * Math.cos(th);
    arr[i * 3 + 1] = rad * Math.sin(phi) * Math.sin(th);
    arr[i * 3 + 2] = rad * Math.cos(phi);
  }
  return arr;
}

function generateSaturn(n) {
  const arr = new Float32Array(n * 3);
  const planetN = Math.floor(n * 0.55);
  const ringN = n - planetN;
  // Planet
  for (let i = 0; i < planetN; i++) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const rad = 1.4;
    arr[i * 3] = rad * Math.sin(phi) * Math.cos(theta);
    arr[i * 3 + 1] = rad * Math.sin(phi) * Math.sin(theta);
    arr[i * 3 + 2] = rad * Math.cos(phi);
  }
  // Rings (tilted ~27 degrees as real Saturn)
  const tiltAngle = 27 * Math.PI / 180;
  for (let i = planetN; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const gap = 2.0 + Math.random() * 1.6;
    const rx = gap * Math.cos(angle);
    const rz = gap * Math.sin(angle);
    const y = (Math.random() - 0.5) * 0.12;
    // Apply tilt around X axis
    const cosT = Math.cos(tiltAngle);
    const sinT = Math.sin(tiltAngle);
    arr[i * 3] = rx;
    arr[i * 3 + 1] = y * cosT - rz * sinT;
    arr[i * 3 + 2] = y * sinT + rz * cosT;
  }
  return arr;
}

function generateBuddha(n) {
  const arr = new Float32Array(n * 3);
  let idx = 0;

  // Head (25%)
  const headN = Math.floor(n * 0.25);
  for (let i = 0; i < headN && idx < n * 3; i++, idx += 3) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r = 0.48;
    arr[idx] = r * Math.sin(phi) * Math.cos(theta);
    arr[idx + 1] = r * Math.sin(phi) * Math.sin(theta) + 1.8;
    arr[idx + 2] = r * Math.cos(phi);
  }

  // Topknot (5%)
  const knotN = Math.floor(n * 0.05);
  for (let i = 0; i < knotN && idx < n * 3; i++, idx += 3) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r = 0.22;
    arr[idx] = r * Math.sin(phi) * Math.cos(theta);
    arr[idx + 1] = r * Math.sin(phi) * Math.sin(theta) + 2.35;
    arr[idx + 2] = r * Math.cos(phi);
  }

  // Body (38%)
  const bodyN = Math.floor(n * 0.38);
  for (let i = 0; i < bodyN && idx < n * 3; i++, idx += 3) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const rx = 0.65, ry = 0.9, rz = 0.38;
    arr[idx] = rx * Math.sin(phi) * Math.cos(theta);
    arr[idx + 1] = ry * Math.sin(phi) * Math.sin(theta) + 0.7;
    arr[idx + 2] = rz * Math.cos(phi);
  }

  // Legs - crossed (22%)
  const legN = Math.floor(n * 0.22);
  for (let i = 0; i < legN && idx < n * 3; i++, idx += 3) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const rx = 0.55, ry = 0.3, rz = 0.4;
    const leg = i < legN / 2 ? -1 : 1;
    arr[idx] = rx * Math.sin(phi) * Math.cos(theta) + leg * 0.4;
    arr[idx + 1] = ry * Math.sin(phi) * Math.sin(theta) - 0.35;
    arr[idx + 2] = rz * Math.cos(phi);
  }

  // Arms (10%)
  while (idx < n * 3) {
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const rx = 0.2, ry = 0.5, rz = 0.18;
    const arm = Math.random() > 0.5 ? -1 : 1;
    arr[idx] = rx * Math.sin(phi) * Math.cos(theta) + arm * 0.8;
    arr[idx + 1] = ry * Math.sin(phi) * Math.sin(theta) + 0.5;
    arr[idx + 2] = rz * Math.cos(phi);
    idx += 3;
  }

  return arr;
}

function generateFireworks(n) {
  const arr = new Float32Array(n * 3);
  const bursts = 7;
  const perBurst = Math.floor(n / bursts);

  for (let b = 0; b < bursts; b++) {
    const cx = (Math.random() - 0.5) * 3.5;
    const cy = (Math.random() - 0.5) * 3.5;
    const cz = (Math.random() - 0.5) * 1.5;
    const burstRadius = 0.5 + Math.random() * 2.0;

    for (let i = 0; i < perBurst; i++) {
      const idx3 = (b * perBurst + i) * 3;
      if (idx3 + 2 >= n * 3) break;
      const phi = Math.acos(2 * Math.random() - 1);
      const theta = Math.random() * Math.PI * 2;
      const r = Math.pow(Math.random(), 0.5) * burstRadius;
      arr[idx3] = cx + r * Math.sin(phi) * Math.cos(theta);
      arr[idx3 + 1] = cy + r * Math.sin(phi) * Math.sin(theta);
      arr[idx3 + 2] = cz + r * Math.cos(phi);
    }
  }
  // Fill remaining
  for (let i = bursts * perBurst; i < n; i++) {
    const idx3 = i * 3;
    const phi = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    arr[idx3] = 3 * Math.sin(phi) * Math.cos(theta);
    arr[idx3 + 1] = 3 * Math.sin(phi) * Math.sin(theta);
    arr[idx3 + 2] = 3 * Math.cos(phi);
  }
  return arr;
}

const shapeGenerators = { heart: generateHeart, flower: generateFlower, saturn: generateSaturn, buddha: generateBuddha, fireworks: generateFireworks };
let currentShape = 'heart';

// Initialize with heart shape
let newBase = generateHeart(PARTICLE_COUNT);
basePositions.set(newBase);
currentPositions.set(newBase);
targetPositions.set(newBase);

// ─────────────────────────────────────
// Gesture State
// ─────────────────────────────────────
let gestureData = {
  handsVisible: 0,
  spreadFactor: 1.0,
  targetSpread: 1.0,
  offsetX: 0,
  targetOffsetX: 0,
  offsetY: 0,
  targetOffsetY: 0,
  offsetZ: 0,
  targetOffsetZ: 0,
  rotationY: 0,
  targetRotationY: 0,
};

// Mouse fallback state
let mouseControl = { active: false, x: 0, y: 0, spread: 1.0 };

// ─────────────────────────────────────
// Hand Tracking
// ─────────────────────────────────────
let handsReady = false;
let handResults = null;

function updateGestureFromResults(results) {
  if (!results || !results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    gestureData.handsVisible = 0;
    gestureData.targetSpread = mouseControl.active ? mouseControl.spread : 1.0;
    if (mouseControl.active) {
      gestureData.targetOffsetX = mouseControl.x;
      gestureData.targetOffsetY = mouseControl.y;
    } else {
      gestureData.targetOffsetX = 0;
      gestureData.targetOffsetY = 0;
      gestureData.targetOffsetZ = 0;
      gestureData.targetRotationY = 0;
    }
    return;
  }

  const hands = results.multiHandLandmarks;
  gestureData.handsVisible = hands.length;

  if (hands.length === 1) {
    const wrist = hands[0][0];
    const midTip = hands[0][12];
    const thumbTip = hands[0][4];
    const pinkyTip = hands[0][20];

    // Hand openness from finger spread
    const openness = Math.sqrt(
      Math.pow(thumbTip.x - pinkyTip.x, 2) + Math.pow(thumbTip.y - pinkyTip.y, 2)
    );
    gestureData.targetSpread = 0.3 + openness * 3.5;

    // Position from wrist
    gestureData.targetOffsetX = (wrist.x - 0.5) * 8;
    gestureData.targetOffsetY = (0.5 - wrist.y) * 6;

    // Depth from hand size (approximate)
    const handSize = Math.sqrt(
      Math.pow(midTip.x - wrist.x, 2) + Math.pow(midTip.y - wrist.y, 2)
    );
    gestureData.targetOffsetZ = (handSize - 0.35) * 8;
    gestureData.targetRotationY = (wrist.x - 0.5) * Math.PI;

  } else if (hands.length >= 2) {
    const leftWrist = hands[0][0];
    const rightWrist = hands[1][0];

    // Ensure left/right ordering (handedness not always reliable)
    const w1 = hands[0][0];
    const w2 = hands[1][0];
    const avgX = (w1.x + w2.x) / 2;
    const avgY = (w1.y + w2.y) / 2;

    // Distance between hands
    const dist = Math.sqrt(
      Math.pow(w1.x - w2.x, 2) + Math.pow(w1.y - w2.y, 2)
    );
    gestureData.targetSpread = 0.2 + dist * 6;

    // Average position
    gestureData.targetOffsetX = (avgX - 0.5) * 7;
    gestureData.targetOffsetY = (0.5 - avgY) * 5;

    // Rotation from hand angle
    gestureData.targetRotationY = Math.atan2(w2.y - w1.y, w2.x - w1.x);

    // Depth from hand separation
    gestureData.targetOffsetZ = (dist - 0.3) * 3;
  }
}

function onHandResults(results) {
  handResults = results;
  updateGestureFromResults(results);
}

// Initialize MediaPipe Hands
async function initHandTracking() {
  if (typeof Hands === 'undefined') {
    camStatus.textContent = '⚠️ 手势库加载失败，使用鼠标控制';
    camStatus.classList.add('error');
    gestureText.textContent = '鼠标控制';
    return;
  }

  try {
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });

    hands.onResults(onHandResults);

    if (typeof Camera === 'undefined') {
      throw new Error('Camera utility not loaded');
    }

    const cameraUtils = new Camera(videoEl, {
      onFrame: async () => {
        try {
          await hands.send({ image: videoEl });
        } catch (e) {
          // Silently retry
        }
      },
      width: 640,
      height: 480,
    });

    await cameraUtils.start();
    handsReady = true;
    camStatus.textContent = '✅ 摄像头就绪 · 展示双手';
    gestureText.textContent = '等待手势...';
    console.log('Hand tracking initialized');
  } catch (err) {
    console.warn('Camera init failed:', err.message);
    camStatus.textContent = '⚠️ 摄像头不可用 · 使用鼠标';
    camStatus.classList.add('error');
    gestureText.textContent = '鼠标控制';
    handsReady = false;
  }
}

// ─────────────────────────────────────
// Mouse Fallback Controls
// ─────────────────────────────────────
container.addEventListener('mousemove', (e) => {
  mouseControl.active = true;
  mouseControl.x = (e.clientX / window.innerWidth - 0.5) * 8;
  mouseControl.y = (0.5 - e.clientY / window.innerHeight) * 6;
});

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  mouseControl.spread = Math.max(0.2, Math.min(3.5, mouseControl.spread - e.deltaY * 0.002));
  mouseControl.active = true;
}, { passive: false });

container.addEventListener('mouseleave', () => {
  mouseControl.active = false;
});

container.addEventListener('mouseenter', () => {
  if (!handsReady || gestureData.handsVisible === 0) {
    mouseControl.active = true;
  }
});

// Touch support
container.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1) {
    mouseControl.active = true;
    mouseControl.x = (e.touches[0].clientX / window.innerWidth - 0.5) * 8;
    mouseControl.y = (0.5 - e.touches[0].clientY / window.innerHeight) * 6;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    mouseControl.spread = Math.max(0.2, Math.min(3.5, dist / 150));
    mouseControl.active = true;
  }
}, { passive: true });

// ─────────────────────────────────────
// Update Loop
// ─────────────────────────────────────
const lerpSpeed = 0.06;
const rotationLerpSpeed = 0.04;

function updateParticles() {
  // Mouse fallback: when hand tracking unavailable or idle, use mouse/touch directly
  if (!handsReady || gestureData.handsVisible === 0) {
    if (mouseControl.active) {
      gestureData.targetSpread = mouseControl.spread;
      gestureData.targetOffsetX = mouseControl.x;
      gestureData.targetOffsetY = mouseControl.y;
      gestureData.targetOffsetZ = 0;
      gestureData.targetRotationY = 0;
    } else if (!handsReady) {
      gestureData.targetSpread = 1.0;
      gestureData.targetOffsetX = 0;
      gestureData.targetOffsetY = 0;
      gestureData.targetOffsetZ = 0;
      gestureData.targetRotationY = 0;
    }
  }

  // Smooth gesture data
  gestureData.spreadFactor += (gestureData.targetSpread - gestureData.spreadFactor) * 0.08;
  gestureData.offsetX += (gestureData.targetOffsetX - gestureData.offsetX) * 0.08;
  gestureData.offsetY += (gestureData.targetOffsetY - gestureData.offsetY) * 0.08;
  gestureData.offsetZ += (gestureData.targetOffsetZ - gestureData.offsetZ) * 0.06;
  gestureData.rotationY += (gestureData.targetRotationY - gestureData.rotationY) * rotationLerpSpeed;

  const sf = gestureData.spreadFactor;
  const ox = gestureData.offsetX;
  const oy = gestureData.offsetY;
  const oz = gestureData.offsetZ;
  const rotY = gestureData.rotationY;
  const cosR = Math.cos(rotY);
  const sinR = Math.sin(rotY);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const bx = basePositions[i3];
    const by = basePositions[i3 + 1];
    const bz = basePositions[i3 + 2];

    // Apply spread and rotation
    const sx = bx * sf;
    const sy = by * sf;
    const sz = bz * sf;

    // Rotate around Y
    const rx = sx * cosR - sz * sinR;
    const rz = sx * sinR + sz * cosR;

    const tx = rx + ox;
    const ty = sy + oy;
    const tz = rz + oz;

    targetPositions[i3] = tx;
    targetPositions[i3 + 1] = ty;
    targetPositions[i3 + 2] = tz;

    // Lerp current toward target
    currentPositions[i3] += (tx - currentPositions[i3]) * lerpSpeed;
    currentPositions[i3 + 1] += (ty - currentPositions[i3 + 1]) * lerpSpeed;
    currentPositions[i3 + 2] += (tz - currentPositions[i3 + 2]) * lerpSpeed;
  }

  geo.attributes.position.needsUpdate = true;
}

function updateGestureStatus() {
  if (!handsReady) {
    gestureText.textContent = '鼠标控制';
    return;
  }
  const h = gestureData.handsVisible;
  if (h === 0) {
    gestureText.textContent = mouseControl.active ? '鼠标控制' : '等待手势...';
  } else if (h === 1) {
    gestureText.textContent = '单手 · 张合控制';
  } else {
    gestureText.textContent = '双手 · 距离控制';
  }
}

function animate() {
  requestAnimationFrame(animate);

  updateParticles();

  // Subtle star rotation
  stars.rotation.y += 0.0003;
  stars.rotation.x += 0.0001;

  // Subtle idle rotation when no input
  if (gestureData.handsVisible === 0 && !mouseControl.active) {
    points.rotation.y += 0.002;
  } else {
    // Apply partial rotation from gesture
    points.rotation.y += (gestureData.rotationY * 0.3 - points.rotation.y) * 0.02;
  }

  renderer.render(scene, camera);
  updateGestureStatus();
}

// ─────────────────────────────────────
// Shape Switching
// ─────────────────────────────────────
function switchShape(shapeName) {
  if (!shapeGenerators[shapeName]) return;
  currentShape = shapeName;
  const newBase = shapeGenerators[shapeName](PARTICLE_COUNT);
  // Copy new base positions immediately for instant target switch,
  // current positions will lerp toward these
  for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
    basePositions[i] = newBase[i];
  }
  // Update button states
  shapeBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.shape === shapeName);
  });
}

// ─────────────────────────────────────
// UI Event Handlers
// ─────────────────────────────────────
shapeBtns.forEach(btn => {
  btn.addEventListener('click', () => switchShape(btn.dataset.shape));
});

colorPicker.addEventListener('input', () => {
  const hex = colorPicker.value;
  colorHex.textContent = hex.toUpperCase();
  particleMat.color.set(hex);
});

btnImage.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const size = 128;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Circular clip
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.clip();

      // Draw image (cover)
      const scale = Math.max(size / img.width, size / img.height);
      const sw = img.width * scale;
      const sh = img.height * scale;
      ctx.drawImage(img, (size - sw) / 2, (size - sh) / 2, sw, sh);

      if (customSprite) customSprite.dispose();
      customSprite = new THREE.CanvasTexture(canvas);
      customSprite.needsUpdate = true;

      particleMat.map = customSprite;
      particleMat.blending = THREE.NormalBlending;
      particleMat.opacity = 1;
      particleMat.needsUpdate = true;

      btnImage.style.display = 'none';
      btnResetImage.style.display = 'flex';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

btnResetImage.addEventListener('click', () => {
  particleMat.map = defaultSprite;
  particleMat.blending = THREE.AdditiveBlending;
  particleMat.opacity = 0.9;
  particleMat.needsUpdate = true;

  btnImage.style.display = 'flex';
  btnResetImage.style.display = 'none';
  fileInput.value = '';
});

btnFullscreen.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.body.requestFullscreen().catch(() => {});
    btnFullscreen.innerHTML = '⛶ 退出全屏';
  } else {
    document.exitFullscreen();
    btnFullscreen.innerHTML = '⛶ 全屏模式';
  }
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    btnFullscreen.innerHTML = '⛶ 全屏模式';
  }
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ─────────────────────────────────────
// Keyboard shortcuts
// ─────────────────────────────────────
window.addEventListener('keydown', (e) => {
  const shapeKeys = { '1': 'heart', '2': 'flower', '3': 'saturn', '4': 'buddha', '5': 'fireworks' };
  if (shapeKeys[e.key]) {
    switchShape(shapeKeys[e.key]);
  }
  if (e.key === 'f' || e.key === 'F') {
    btnFullscreen.click();
  }
});

// ─────────────────────────────────────
// Start
// ─────────────────────────────────────
function init() {
  initHandTracking();
  animate();

  // Set initial color display
  colorHex.textContent = colorPicker.value.toUpperCase();
}

init();
</script>
</body>
</html>
